<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>객실 추가 - Azasu Guesthouse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header">
        <!-- Header content will be dynamically loaded by auth.js -->
    </header>

    <main>
        <h1>객실 추가</h1>
        <form id="add-room-form">
            <div class="form-group">
                <label for="room-name">객실명 (20자 이하)</label>
                <input type="text" id="room-name" required maxlength="20">
            </div>
            <div class="form-group">
                <label for="room-image">사진 (15MB 이하, jpg/jpeg/webp/png)</label>
                <input type="file" id="room-image" accept="image/jpeg, image/png, image/webp" required>
            </div>
            <div class="form-group">
                <label for="room-guests">인원수 (1~100)</label>
                <input type="number" id="room-guests" required min="1" max="100">
            </div>
            <div class="form-group">
                <label for="room-price">1박 가격</label>
                <input type="number" id="room-price" required min="0">
            </div>
            <div class="form-group">
                <label for="room-description">설명 (2000자 이하)</label>
                <textarea id="room-description" rows="5" maxlength="2000"></textarea>
            </div>
            <div class="form-group">
                <label for="room-rules">이용규칙 (2000자 이하)</label>
                <textarea id="room-rules" rows="5" maxlength="2000"></textarea>
            </div>
            <button type="submit">추가하기</button>
        </form>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api/config.js"></script>
    <script src="js/api/admin.js"></script>
    <script src="js/pages/admin-room-add.js"></script>
</body>
</html>
