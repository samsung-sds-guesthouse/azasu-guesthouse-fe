<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azasu Guesthouse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header">
        <!-- Header content will be dynamically loaded by auth.js -->
    </header>

    <main>
        <h1>객실 목록</h1>
        <div class="search-container">
            <input type="date" id="start-date">
            <input type="date" id="end-date">
            <select id="guest-count">
                <!-- Options will be populated by main.js -->
            </select>
            <button id="search-btn">검색</button>
        </div>
        <div id="room-list" class="room-list">
            <!-- Room list will be populated by main.js -->
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api/config.js"></script>
    <script src="js/api/auth.js"></script>
    <script src="js/api/rooms.js"></script>
    <script src="js/pages/main.js"></script>
</body>
</html>
