<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약하기 - Azasu Guesthouse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">홈</a>
        </nav>
    </header>
    <main>
        <section class="reservation-section">
            <h1>예약하기</h1>
            <form action="confirmation.html" method="post">
                <h2>예약자 정보</h2>
                <input type="text" name="name" placeholder="이름" required>
                <input type="email" name="email" placeholder="이메일" required>
                <input type="tel" name="phone" placeholder="휴대폰 번호" required>

                <h2>결제 정보</h2>
                <input type="text" name="card-number" placeholder="카드 번호" required>
                <input type="text" name="expiry-date" placeholder="유효기간 (MM/YY)" required>
                <input type="text" name="cvc" placeholder="CVC" required>

                <button type="submit">예약 완료</button>
            </form>
        </section>
    </main>
    <footer>
        <ul>
            <li><a href="#">서비스 소개</a></li>
            <li><a href="#">이용약관</a></li>
            <li><a href="#">개인정보처리방침</a></li>
        </ul>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
