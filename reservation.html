<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 예약 - Azasu Guesthouse</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header">
        <!-- Header content will be dynamically loaded by auth.js -->
    </header>

    <main class="page-wrapper reservation-page">
        <section class="reservation-hero">
            <span class="page-eyebrow">My Reservation</span>
            <h1 class="page-title">내 예약</h1>
            <p class="reservation-intro">예약 현황과 숙박 일정을 한눈에 확인하고, 필요한 경우 바로 예약을 취소할 수 있습니다.</p>
        </section>

        <div class="page-divider"></div>

        <section id="my-reservations" class="reservation-board">
            <div class="reservation-list-header">
                <p class="reservation-list-title">예약 목록</p>
                <p class="reservation-list-caption">예약명과 사진을 누르면 객실 상세 페이지로 이동합니다.</p>
            </div>
            <div id="reservation-list">
                <!-- Reservation list will be populated here -->
            </div>
            <div id="pagination">
                <!-- Pagination controls will be added here -->
            </div>
        </section>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/api/config.js"></script>
    <script src="js/api/auth.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/api/reservations.js"></script>
    <script src="js/pages/reservation.js"></script>
</body>
</html>
