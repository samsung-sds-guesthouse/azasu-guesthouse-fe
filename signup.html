<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 - Azasu Guesthouse</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header id="header">
      <!-- Header content will be dynamically loaded by auth.js -->
    </header>

    <main class="auth-page">
      <section class="auth-card">
        <p class="auth-logo">AZASU GUESTHOUSE</p>
        <p class="auth-subtitle">회원가입 후 아자수 게스트하우스의 예약 서비스를 이용해보세요</p>

        <form id="signup-form" novalidate>
          <div class="form-group">
            <label for="username">아이디</label>
            <input
              type="text"
              id="username"
              placeholder="아이디 (8~15자)"
              required
              minlength="8"
              maxlength="15"
              aria-describedby="signup-username-message"
            />
            <button type="button" id="check-username-btn">중복 체크</button>
            <p
              id="signup-username-message"
              class="field-message"
              aria-live="polite"
              hidden
            ></p>
          </div>
          <div class="form-group">
            <label for="password">비밀번호</label>
            <input
              type="password"
              id="password"
              placeholder="비밀번호 (12~20자)"
              required
              minlength="12"
              maxlength="20"
              aria-describedby="signup-password-message"
            />
            <p
              id="signup-password-message"
              class="field-message"
              aria-live="polite"
            >
              비밀번호는 12자 이상 20자 이하로 입력해주세요.
            </p>
          </div>
          <div class="form-group">
            <label for="password-confirm">비밀번호 확인</label>
            <input
              type="password"
              id="password-confirm"
              placeholder="비밀번호 확인"
              required
              minlength="12"
              maxlength="20"
              aria-describedby="password-confirm-message"
            />
            <p
              id="password-confirm-message"
              class="field-message"
              aria-live="polite"
              hidden
            ></p>
          </div>
          <div class="form-group">
            <label for="name">이름</label>
            <input
              type="text"
              id="name"
              placeholder="이름 (1~30자)"
              required
              minlength="1"
              maxlength="30"
              aria-describedby="signup-name-message"
            />
            <p
              id="signup-name-message"
              class="field-message"
              aria-live="polite"
              hidden
            ></p>
          </div>
          <div class="form-group">
            <label for="phone">전화번호</label>
            <input
              type="tel"
              id="phone"
              placeholder="전화번호 (예시 : 01012345678)"
              required
              pattern="010\d{8}"
              aria-describedby="signup-phone-message"
            />
            <button type="button" id="send-sms-btn">인증번호 발송</button>
            <p
              id="signup-phone-message"
              class="field-message"
              aria-live="polite"
              hidden
            ></p>
          </div>
          <div class="form-group" id="sms-verify-group" style="display: none">
            <label for="sms-code">인증번호</label>
            <input
              type="text"
              id="sms-code"
              placeholder="인증번호 6자리 입력"
              inputmode="numeric"
              maxlength="6"
              aria-describedby="signup-sms-message"
            />
            <span id="sms-timer">5:00</span>
            <button type="button" id="verify-sms-btn">인증 확인</button>
            <p
              id="signup-sms-message"
              class="field-message"
              aria-live="polite"
              hidden
            ></p>
          </div>
          <p
            id="signup-status-message"
            class="field-message auth-status-message"
            aria-live="polite"
          >
            아이디 중복 확인과 전화번호 인증을 완료하면 회원가입할 수 있습니다.
          </p>
          <button type="submit" id="signup-btn" disabled>회원가입</button>
        </form>
      </section>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/api/config.js"></script>
    <script src="js/api/auth.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/api/users.js"></script>
    <script src="js/pages/signup.js"></script>
  </body>
</html>
